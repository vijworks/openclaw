name: Auto-Sync & Build OpenClaw

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "JarvisOS"
          git config user.email "bzenjarvis@gmail.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream

      - name: Check for new releases
        id: check_release
        run: |
          LATEST_UPSTREAM=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "none")
          CURRENT=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "none")
          echo "latest_upstream=$LATEST_UPSTREAM" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LATEST_UPSTREAM" != "$CURRENT" ] && [ "$LATEST_UPSTREAM" != "none" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi
           - name: Merge upstream
        if: steps.check_release.outputs.needs_update == 'true'
        run: |
          git merge upstream/main -m "chore: sync with upstream OpenClaw ${{ steps.check_release.outputs.latest_upstream }}"
          git push origin main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            OPENCLAW_INSTALL_BROWSER=1

      - name: Log result
        if: steps.check_release.outputs.needs_update == 'true'
        run: |
          echo "Docker image built and pushed to ghcr.io/${{ github.repository }}:latest"
